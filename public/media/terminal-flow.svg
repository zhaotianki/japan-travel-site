<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-label="Codex CLI 终端工作流示意图">
  <rect width="1120" height="640" fill="#eef2ff"/>
  <rect x="80" y="70" width="960" height="500" rx="8" fill="#0f172a"/>
  <rect x="80" y="70" width="960" height="52" rx="8" fill="#111827"/>
  <circle cx="120" cy="96" r="9" fill="#ef4444"/>
  <circle cx="150" cy="96" r="9" fill="#f59e0b"/>
  <circle cx="180" cy="96" r="9" fill="#22c55e"/>
  <text x="118" y="176" fill="#94a3b8" font-family="Arial" font-size="24">$ rg --files</text>
  <text x="118" y="230" fill="#e5e7eb" font-family="Arial" font-size="24">$ codex \"fix build and verify\"</text>
  <text x="118" y="284" fill="#38bdf8" font-family="Arial" font-size="24">reading app, tests, package scripts...</text>
  <text x="118" y="338" fill="#22c55e" font-family="Arial" font-size="24">patch applied</text>
  <text x="118" y="392" fill="#f97316" font-family="Arial" font-size="24">$ npm run build</text>
  <text x="118" y="446" fill="#22c55e" font-family="Arial" font-size="24">build passed</text>
  <text x="118" y="500" fill="#e5e7eb" font-family="Arial" font-size="24">review diff → ship</text>
</svg>
