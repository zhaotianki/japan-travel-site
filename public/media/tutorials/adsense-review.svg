<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AdSense review checklist</title>
  <desc id="desc">AdSense review needs production domain, original content, privacy policy, ads.txt, and consent handling.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="64" y="56" width="1152" height="608" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="100" y="126" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">AdSense 审核与广告收益配置</text>
  <g font-family="Arial, sans-serif">
    <rect x="126" y="210" width="1028" height="86" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/><text x="170" y="264" fill="#111827" font-size="25" font-weight="700">1. 生产域名可访问</text>
    <rect x="126" y="324" width="1028" height="86" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/><text x="170" y="378" fill="#111827" font-size="25" font-weight="700">2. 原创教程内容充足</text>
    <rect x="126" y="438" width="500" height="86" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="3"/><text x="170" y="492" fill="#111827" font-size="25" font-weight="700">3. 隐私政策</text>
    <rect x="654" y="438" width="500" height="86" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/><text x="698" y="492" fill="#111827" font-size="25" font-weight="700">4. ads.txt</text>
    <rect x="326" y="558" width="628" height="58" rx="12" fill="#111827"/><text x="368" y="596" fill="#a7f3d0" font-size="21">google.com, pub-..., DIRECT</text>
  </g>
</svg>
