<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex installation workflow</title>
  <desc id="desc">A clear workflow diagram for checking local tools, signing in to Codex, reading a project, running a task, and verifying results.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="54" y="52" width="1172" height="616" rx="24" fill="#ffffff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="92" y="118" fill="#0f172a" font-family="Arial, sans-serif" font-size="44" font-weight="700">Codex 安装到第一次跑起来</text>
  <text x="94" y="158" fill="#475569" font-family="Arial, sans-serif" font-size="22">环境检查 -> 登录授权 -> 读取项目 -> 执行任务 -> 验证结果</text>
  <g font-family="Arial, sans-serif">
    <rect x="94" y="218" width="205" height="154" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="124" y="266" fill="#0f172a" font-size="27" font-weight="700">1. 环境</text>
    <text x="124" y="310" fill="#334155" font-size="20">node --version</text>
    <text x="124" y="338" fill="#334155" font-size="20">npm --version</text>
    <rect x="368" y="218" width="205" height="154" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <text x="398" y="266" fill="#0f172a" font-size="27" font-weight="700">2. 登录</text>
    <text x="398" y="310" fill="#334155" font-size="20">账号 / API Key</text>
    <text x="398" y="338" fill="#334155" font-size="20">授权成功</text>
    <rect x="642" y="218" width="205" height="154" rx="14" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <text x="672" y="266" fill="#0f172a" font-size="27" font-weight="700">3. 项目</text>
    <text x="672" y="310" fill="#334155" font-size="20">git status</text>
    <text x="672" y="338" fill="#334155" font-size="20">只读检查</text>
    <rect x="916" y="218" width="205" height="154" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="946" y="266" fill="#0f172a" font-size="27" font-weight="700">4. 任务</text>
    <text x="946" y="310" fill="#334155" font-size="20">修改文件</text>
    <text x="946" y="338" fill="#334155" font-size="20">运行测试</text>
    <path d="M310 295h45" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M562 295h67" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M838 295h65" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <rect x="184" y="446" width="912" height="126" rx="16" fill="#111827"/>
    <text x="222" y="494" fill="#ffffff" font-size="23" font-weight="700">$ codex</text>
    <text x="222" y="532" fill="#a7f3d0" font-size="20">读取项目 -> 生成补丁 -> npm run build -> 汇报 diff</text>
    <circle cx="1048" cy="506" r="34" fill="#22c55e"/>
    <path d="M1030 505l13 14 28-32" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
