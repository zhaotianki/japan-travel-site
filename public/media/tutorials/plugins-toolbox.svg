<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI plugin installation toolbox</title>
  <desc id="desc">A plugin setup diagram showing source check, permission review, installation, configuration, verification, and rollback.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="66" y="56" width="1148" height="608" rx="24" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="104" y="126" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">相关插件安装与验证</text>
  <text x="106" y="164" fill="#64748b" font-family="Arial, sans-serif" font-size="22">来源检查 -> 权限确认 -> 安装配置 -> 最小验证 -> 回滚记录</text>
  <g font-family="Arial, sans-serif">
    <rect x="116" y="238" width="178" height="150" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="154" y="296" fill="#0f172a" font-size="25" font-weight="700">来源</text>
    <text x="146" y="336" fill="#334155" font-size="19">官方市场</text>
    <rect x="342" y="238" width="178" height="150" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="380" y="296" fill="#0f172a" font-size="25" font-weight="700">权限</text>
    <text x="372" y="336" fill="#334155" font-size="19">最小授权</text>
    <rect x="568" y="238" width="178" height="150" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <text x="606" y="296" fill="#0f172a" font-size="25" font-weight="700">安装</text>
    <text x="598" y="336" fill="#334155" font-size="19">启用配置</text>
    <rect x="794" y="238" width="178" height="150" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="832" y="296" fill="#0f172a" font-size="25" font-weight="700">验证</text>
    <text x="824" y="336" fill="#334155" font-size="19">最小任务</text>
    <rect x="1020" y="238" width="178" height="150" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <text x="1058" y="296" fill="#0f172a" font-size="25" font-weight="700">回滚</text>
    <text x="1050" y="336" fill="#334155" font-size="19">禁用卸载</text>
    <path d="M308 312h26M534 312h26M760 312h26M986 312h26" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
    <rect x="194" y="472" width="886" height="86" rx="16" fill="#111827"/>
    <text x="238" y="526" fill="#a7f3d0" font-size="23">记录插件名称、版本、权限、配置文件、截图和错误日志</text>
  </g>
</svg>
