<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Real operation case log</title>
  <desc id="desc">A case log with command, error, screenshot, fix, and final verification.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="70" y="56" width="1140" height="608" rx="24" fill="#fff" stroke="#e2e8f0" stroke-width="3"/>
  <text x="106" y="126" fill="#111827" font-family="Arial, sans-serif" font-size="42" font-weight="700">真实操作案例记录</text>
  <rect x="112" y="184" width="1056" height="396" rx="18" fill="#111827"/>
  <text x="154" y="248" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="24">$ npm run build</text>
  <text x="154" y="300" fill="#fca5a5" font-family="Arial, sans-serif" font-size="24">ERROR: Missing environment variable</text>
  <text x="154" y="352" fill="#fde68a" font-family="Arial, sans-serif" font-size="24">Screenshot: build-error-01.png</text>
  <text x="154" y="404" fill="#93c5fd" font-family="Arial, sans-serif" font-size="24">Fix: add variable in Vercel project settings</text>
  <text x="154" y="456" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="24">Result: production page returns HTTP 200</text>
  <rect x="780" y="226" width="300" height="252" rx="16" fill="#f8fafc"/>
  <text x="820" y="290" fill="#0f172a" font-family="Arial, sans-serif" font-size="25" font-weight="700">必须包含</text>
  <text x="820" y="340" fill="#334155" font-family="Arial, sans-serif" font-size="21">命令</text>
  <text x="820" y="378" fill="#334155" font-family="Arial, sans-serif" font-size="21">错误</text>
  <text x="820" y="416" fill="#334155" font-family="Arial, sans-serif" font-size="21">修复</text>
  <text x="820" y="454" fill="#334155" font-family="Arial, sans-serif" font-size="21">验证</text>
</svg>
